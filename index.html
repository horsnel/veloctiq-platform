<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloctiq.io | Intelligence Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans p-6">
    <div class="max-w-xl mx-auto">
        <div class="flex items-center justify-between mb-8 border-b border-zinc-800 pb-6">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter text-cyan-400">VELOCTIQ.IO</h1>
                <p class="text-xs text-zinc-500 uppercase tracking-widest">Live Intelligence Feed</p>
            </div>
            <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>

        <div id="trend-list" class="space-y-4">
            <p class="text-zinc-600 text-sm animate-pulse text-center">Syncing with Scout Agent...</p>
        </div>
    </div>

    <script>
        // Use the public keys we discussed (Pulling from Cloudflare Env)
        const supabaseUrl = 'YOUR_SUPABASE_URL_HERE';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY_HERE';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        async function fetchTrends() {
            const { data, error } = await supabase
                .from('viral_trends')
                .select('*')
                .order('first_detected', { ascending: false })
                .limit(5);

            const container = document.getElementById('trend-list');
            
            if (data && data.length > 0) {
                container.innerHTML = data.map(trend => `
                    <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl hover:border-cyan-500/50 transition-colors">
                        <div class="flex justify-between items-start">
                            <h3 class="font-medium text-zinc-200">${trend.trend_name}</h3>
                            <span class="text-[10px] font-bold bg-cyan-500/10 text-cyan-400 px-2 py-1 rounded-full">
                                ${trend.acceleration_rate}% VELOCITY
                            </span>
                        </div>
                        <div class="mt-3 flex items-center gap-2">
                            <div class="h-1 flex-1 bg-zinc-800 rounded-full overflow-hidden">
                                <div class="h-full bg-cyan-500" style="width: ${trend.acceleration_rate}%"></div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="text-zinc-500 text-center text-sm">No trends detected yet. Scout is hunting...</p>';
            }
        }

        fetchTrends();
        setInterval(fetchTrends, 30000); // Auto-refresh every 30 seconds
    </script>
</body>
</html>
